<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 40px;
            border-bottom: 2px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header .logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
        }

        header h1 span {
            color: #e94560;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
        }

        .tab-btn {
            padding: 12px 28px;
            border: none;
            background: #1a1a2e;
            color: #888;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
        }

        .tab-btn:hover:not(.active) {
            background: #16213e;
            color: #ccc;
        }

        .tab-btn svg {
            width: 18px;
            height: 18px;
        }

        .panel {
            display: none;
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #16213e;
            padding: 30px;
            animation: fadeIn 0.3s ease;
        }

        .panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-zone {
            border: 2px dashed #0f3460;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(15, 52, 96, 0.1);
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.05);
        }

        .upload-zone svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .upload-zone h3 {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .upload-zone p {
            color: #666;
            font-size: 13px;
        }

        .upload-zone input[type="file"] {
            display: none;
        }

        .btn-detect {
            margin-top: 20px;
            padding: 12px 36px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-detect:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4); }
        .btn-detect:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .preview-area {
            margin-top: 25px;
            display: none;
        }

        .preview-area.show { display: block; }

        .preview-area .img-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #0f0f1a;
        }

        .preview-area img {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        .camera-panel {
            text-align: center;
        }

        .camera-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #0f0f1a;
            display: inline-block;
        }

        .camera-wrapper video, .camera-wrapper img {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            display: block;
        }

        .camera-controls {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-camera {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00b894, #00a381);
            color: #fff;
        }

        .btn-start:hover { box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4); }

        .btn-stop {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
        }

        .btn-stop:hover { box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }

        .btn-snap {
            background: linear-gradient(135deg, #0984e3, #0769b5);
            color: #fff;
        }

        .btn-snap:hover { box-shadow: 0 4px 15px rgba(9, 132, 227, 0.4); }

        .btn-camera:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-bar {
            margin-top: 20px;
            padding: 12px 20px;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 8px;
            font-size: 14px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e94560;
        }

        .status-bar .dot.active {
            background: #00b894;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .results-panel {
            margin-top: 25px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .results-header h3 {
            font-size: 16px;
            color: #ccc;
        }

        .badge {
            background: #e94560;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .detection-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .detection-item {
            background: rgba(15, 52, 96, 0.4);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .detection-item .class-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e94560;
        }

        .detection-item .conf {
            color: #00b894;
            font-weight: 600;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #16213e;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 14px;
        }

        .placeholder-cam {
            width: 640px;
            max-width: 100%;
            height: 480px;
            background: #0f0f1a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 15px;
            border: 2px dashed #16213e;
        }

        @media (max-width: 700px) {
            header { padding: 15px 20px; }
            .container { padding: 0 10px; margin: 15px auto; }
            .panel { padding: 20px; }
            .upload-zone { padding: 40px 20px; }
            .tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">OD</div>
        <h1>Object <span>Detection</span></h1>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Upload Gambar
            </button>
            <button class="tab-btn" onclick="switchTab('camera')">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                Kamera Realtime
            </button>
        </div>

        <!-- Upload Panel -->
        <div class="panel active" id="upload-panel">
            <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                <h3>Seret & lepas gambar di sini</h3>
                <p>atau klik untuk memilih file (JPG, PNG, JPEG)</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div style="text-align:center">
                <button class="btn-detect" id="btnDetect" onclick="detectImage()" disabled>Detect Objek</button>
            </div>
            <div class="preview-area" id="previewArea">
                <div class="results-header">
                    <h3>Hasil Deteksi</h3>
                    <span class="badge" id="countBadge">0 objek</span>
                </div>
                <div class="img-wrapper">
                    <img id="resultImg" src="" alt="Hasil Deteksi">
                </div>
                <div class="detection-list" id="detectionList"></div>
            </div>
        </div>

        <!-- Camera Panel -->
        <div class="panel" id="camera-panel">
            <div class="camera-panel">
                <div class="camera-wrapper" id="cameraWrapper">
                    <div class="placeholder-cam" id="cameraPlaceholder">Klik "Mulai Kamera" untuk memulai</div>
                    <video id="cameraVideo" autoplay playsinline style="display:none"></video>
                    <img id="cameraResult" style="display:none" alt="Camera Detection">
                </div>
                <div class="camera-controls">
                    <button class="btn-camera btn-start" id="btnStartCam" onclick="startCamera()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
                        Mulai Kamera
                    </button>
                    <button class="btn-camera btn-snap" id="btnSnap" onclick="captureFrame()" disabled>
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
                        Deteksi Sekarang
                    </button>
                    <button class="btn-camera btn-stop" id="btnStopCam" onclick="stopCamera()" disabled>
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
                        Stop
                    </button>
                </div>
                <div class="status-bar">
                    <div class="dot" id="camDot"></div>
                    <span id="camStatus">Kamera tidak aktif</span>
                </div>
                <div class="results-panel" id="cameraResults" style="display:none">
                    <div class="results-header">
                        <h3>Hasil Deteksi Kamera</h3>
                        <span class="badge" id="camCountBadge">0 objek</span>
                    </div>
                    <div class="detection-list" id="camDetectionList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <script>
        let selectedFile = null;
        let cameraStream = null;
        let cameraActive = false;

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            if (tab === 'upload') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('upload-panel').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('camera-panel').classList.add('active');
            }
        }

        // Upload handling
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return;
            selectedFile = file;
            document.getElementById('btnDetect').disabled = false;
            dropzone.querySelector('h3').textContent = file.name;
            dropzone.querySelector('p').textContent = `${(file.size / 1024).toFixed(1)} KB`;
        }

        async function detectImage() {
            if (!selectedFile) return;
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('btnDetect').disabled = true;

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const res = await fetch('/detect', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                document.getElementById('resultImg').src = 'data:image/jpeg;base64,' + data.image;
                document.getElementById('previewArea').classList.add('show');
                document.getElementById('countBadge').textContent = data.count + ' objek';

                const list = document.getElementById('detectionList');
                list.innerHTML = '';
                data.detections.forEach(d => {
                    list.innerHTML += `
                        <div class="detection-item">
                            <div class="class-dot"></div>
                            <span>${d.class}</span>
                            <span class="conf">${(d.confidence * 100).toFixed(1)}%</span>
                        </div>
                    `;
                });

                if (data.count === 0) {
                    list.innerHTML = '<div class="no-results">Tidak ada objek terdeteksi</div>';
                }
            } catch (err) {
                alert('Gagal melakukan deteksi: ' + err.message);
            } finally {
                document.getElementById('loadingOverlay').classList.remove('show');
                document.getElementById('btnDetect').disabled = false;
            }
        }

        // Camera handling
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'environment' }
                });
                const video = document.getElementById('cameraVideo');
                video.srcObject = cameraStream;
                video.style.display = 'block';
                document.getElementById('cameraPlaceholder').style.display = 'none';
                document.getElementById('cameraResult').style.display = 'none';

                document.getElementById('btnStartCam').disabled = true;
                document.getElementById('btnSnap').disabled = false;
                document.getElementById('btnStopCam').disabled = false;
                document.getElementById('camDot').classList.add('active');
                document.getElementById('camStatus').textContent = 'Kamera aktif - Siap mendeteksi';
                cameraActive = true;
            } catch (err) {
                alert('Gagal mengakses kamera: ' + err.message);
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            cameraActive = false;
            document.getElementById('cameraVideo').style.display = 'none';
            document.getElementById('cameraPlaceholder').style.display = 'flex';
            document.getElementById('cameraResult').style.display = 'none';

            document.getElementById('btnStartCam').disabled = false;
            document.getElementById('btnSnap').disabled = true;
            document.getElementById('btnStopCam').disabled = true;
            document.getElementById('camDot').classList.remove('active');
            document.getElementById('camStatus').textContent = 'Kamera tidak aktif';
        }

        async function captureFrame() {
            if (!cameraActive) return;

            const video = document.getElementById('cameraVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('btnSnap').disabled = true;

            try {
                const res = await fetch('/detect_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });
                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                const resultImg = document.getElementById('cameraResult');
                resultImg.src = 'data:image/jpeg;base64,' + data.image;
                resultImg.style.display = 'block';
                video.style.display = 'none';

                document.getElementById('camCountBadge').textContent = data.count + ' objek';
                document.getElementById('cameraResults').style.display = 'block';

                const list = document.getElementById('camDetectionList');
                list.innerHTML = '';
                data.detections.forEach(d => {
                    list.innerHTML += `
                        <div class="detection-item">
                            <div class="class-dot"></div>
                            <span>${d.class}</span>
                            <span class="conf">${(d.confidence * 100).toFixed(1)}%</span>
                        </div>
                    `;
                });

                if (data.count === 0) {
                    list.innerHTML = '<div class="no-results">Tidak ada objek terdeteksi</div>';
                }

                setTimeout(() => {
                    resultImg.style.display = 'none';
                    video.style.display = 'block';
                    document.getElementById('btnSnap').disabled = false;
                }, 2000);

            } catch (err) {
                alert('Gagal mendeteksi: ' + err.message);
                document.getElementById('btnSnap').disabled = false;
            } finally {
                document.getElementById('loadingOverlay').classList.remove('show');
            }
        }
    </script>
</body>
</html>
